# Apache2 VirtualHost configuration for Bibi

# HTTP redirect to HTTPS for bibi (Frontend)
<VirtualHost *:80>
    ServerName bibi.yourdomain.com
    Redirect permanent / https://bibi.yourdomain.com/
</VirtualHost>

# HTTP redirect to HTTPS for api (FastAPI Backend)
<VirtualHost *:80>
    ServerName api.bibi.yourdomain.com
    Redirect permanent / https://api.bibi.yourdomain.com/
</VirtualHost>

# HTTPS Configuration for bibi (Frontend serving Static files)
<VirtualHost *:443>
    ServerName bibi.yourdomain.com

    DocumentRoot /var/www/bibi/frontend/dist

    <Directory /var/www/bibi/frontend/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Support client-side routing (React Router fallback)
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.html [L]
    </Directory>

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/bibi.yourdomain.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/bibi.yourdomain.com/privkey.pem

    ErrorLog ${APACHE_LOG_DIR}/bibi_error.log
    CustomLog ${APACHE_LOG_DIR}/bibi_access.log combined
</VirtualHost>

# HTTPS Configuration for api (FastAPI Backend Proxy)
<VirtualHost *:443>
    ServerName api.bibi.yourdomain.com

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/api.yourdomain.com/privkey.pem

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/

    # Security Headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set X-XSS-Protection "1; mode=block"

    ErrorLog ${APACHE_LOG_DIR}/bibi_api_error.log
    CustomLog ${APACHE_LOG_DIR}/bibi_api_access.log combined
</VirtualHost>
