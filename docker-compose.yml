services:
  bibi-postgres:
    image: postgres:16-alpine
    container_name: ${ENV_PREFIX:-prod}-bibi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bibi_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_replace_me}
      POSTGRES_DB: ${POSTGRES_DB:-bibi_db}
    volumes:
      - ${ENV_PREFIX:-prod}-postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${BIBI_DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bibi_admin} -d ${POSTGRES_DB:-bibi_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  bibi-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${ENV_PREFIX:-prod}-bibi-api
    restart: unless-stopped
    depends_on:
      bibi-postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: ${ENV_PREFIX:-prod}-bibi-postgres
    ports:
      - "${BIBI_API_PORT:-8080}:8000"
    volumes:
      - ./backend:/app
      - ${ENV_PREFIX:-prod}-raw_s3_payloads:/app/storage

  bibi-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${ENV_PREFIX:-prod}-bibi-frontend
    restart: unless-stopped
    ports:
      - "${BIBI_FRONTEND_PORT:-8083}:80"

volumes:
  postgres_data:
    name: ${ENV_PREFIX:-prod}-postgres_data
  raw_s3_payloads:
    name: ${ENV_PREFIX:-prod}-raw_s3_payloads
